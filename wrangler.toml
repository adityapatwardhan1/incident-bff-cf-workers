name = "incident-bff-cf-workers"
main = "src/index.ts"
compatibility_date = "2025-03-01"

[[services]]
binding = "SELF"
service = "incident-bff-cf-workers"

[[kv_namespaces]]
binding = "SLICE_CACHE"
id = "00000000000000000000000000000001"
preview_id = "00000000000000000000000000000001"

[[d1_databases]]
binding = "DB"
database_name = "incident-bff-circuit"
database_id = "00000000000000000000000000000002"
migrations_dir = "migrations"

[vars]
TICKETS_MODE = "ok"
METRICS_RATE_LIMIT = "10"
