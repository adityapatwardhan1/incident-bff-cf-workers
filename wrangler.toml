name = "incident-bff-cf-workers"
main = "src/index.ts"
compatibility_date = "2025-03-01"

[[services]]
binding = "SELF"
service = "incident-bff-cf-workers"

[[kv_namespaces]]
binding = "SLICE_CACHE"
id = "00000000000000000000000000000001"
preview_id = "00000000000000000000000000000001"

[[d1_databases]]
binding = "DB"
database_name = "incident-bff-circuit"
database_id = "00000000000000000000000000000002"
migrations_dir = "migrations"

[[queues.producers]]
binding = "REFRESH_QUEUE"
queue = "incident-bff-refresh"

[[queues.consumers]]
queue = "incident-bff-refresh"
max_batch_size = 10
max_batch_timeout = 5
max_retries = 3

[vars]
TICKETS_MODE = "ok"
METRICS_RATE_LIMIT = "10"
